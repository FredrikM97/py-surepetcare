name: pre-commit

on:
  push:
    branches: [dev]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Run pre-commit on changed files (PR)
        if: github.event_name == 'pull_request'
        run: uv tool run --from pre-commit pre-commit run --show-diff-on-failure --color=always --from-ref origin/${{ github.base_ref }} --to-ref HEAD
      - name: Run pre-commit on all files (push to dev)
        if: github.event_name == 'push'
        run: uv tool run --from pre-commit pre-commit run --show-diff-on-failure --color=always --all-files
       
